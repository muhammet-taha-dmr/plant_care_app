{% extends "base.html" %}
{% block content %}
<div style="max-width:450px;margin:4rem auto">
  <div class="card">
    <h1 style="text-align:center;margin-bottom:2rem;color:#2d6a2d">Login</h1>
    <form method="POST">
      <div style="margin-bottom:1.2rem">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div style="margin-bottom:1.5rem">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:.8rem">Sign In</button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;font-size:.9rem;color:#6c757d">
      Don't have an account? <a href="/register" style="color:#2d6a2d;font-weight:600">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
