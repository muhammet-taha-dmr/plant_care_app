{% extends "base.html" %}
{% block content %}
<div style="max-width:600px;margin:0 auto">
  <div style="margin-bottom:2rem">
    <a href="/plants/{{ plant.id }}" style="color:#2d6a2d;text-decoration:none;font-size:.9rem">← Back to Details</a>
    <h1 style="margin-top:1rem">🌿 Edit Plant: {{ plant.name }}</h1>
  </div>
  
  <div class="card">
    <form method="POST">
      <div style="margin-bottom:1.2rem">
        <label for="name">Plant Name *</label>
        <input type="text" id="name" name="name" value="{{ plant.name }}" required>
      </div>
      
      <div style="margin-bottom:1.2rem">
        <label for="species">Species</label>
        <input type="text" id="species" name="species" value="{{ plant.species }}">
      </div>
      
      <div style="margin-bottom:1.2rem">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" value="{{ plant.location }}">
      </div>
      
      <div style="margin-bottom:1.2rem">
        <label for="watering_interval_days">Watering Interval (Days) *</label>
        <input type="number" id="watering_interval_days" name="watering_interval_days" value="{{ plant.watering_interval_days }}" min="1" required>
      </div>
      
      <div style="margin-bottom:1.5rem">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="3">{{ plant.notes }}</textarea>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width:100%">Update Plant</button>
    </form>
  </div>
</div>
{% endblock %}
